<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Nelson Cup</title>

  <style>

      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      background: linear-gradient(90deg, #22c55e, #0ea5e9);
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    nav {
      margin-top: 15px;

    nav a {

      text-decoration: none;
      font-weight: bold;

    section {

    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px;

      display: inline-block;
      width: 250px;

<body>

<header>

  <nav>
    <a href="#">Início</a>
    <a href="#">Jogadores</a>
    <a href="#">Copas</a>
  </nav>
</header>

<section>
  <h2>🏆 Últimas Copas</h2>

  <div class="card">
    <h3>Copa 2025</h3>
    <p>Campeão: João</p>
  </div>

  <div class="card">
    <h3>Copa 2024</h3>
    <p>Campeão: Pedro</p>
  </div>

</html>
