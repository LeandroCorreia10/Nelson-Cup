<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nelson Cup</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  text-align: center;
}

header {
  padding: 35px 20px;
  background: linear-gradient(135deg, #16a34a, #0284c7, #1d4ed8);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  position: sticky;
  top: 0;
  z-index: 10;
}

h1 {
  font-size: 58px;
  margin: 0 0 25px;
  letter-spacing: 3px;
  text-shadow: 0 0 18px rgba(255,255,255,0.35);
}

nav {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

nav button {
  font-size: 22px;
  padding: 18px 34px;
  border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.85);
  font-weight: 900;
  background: linear-gradient(135deg, #ffffff, #dbeafe);
  color: #020617;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,0,0,0.35);
  transition: 0.25s;
}

nav button:hover {
  transform: scale(1.08);
  background: #facc15;
}

section {
  padding: 35px 20px;
}

.hidden {
  display: none;
}

.hero {
  min-height: 72vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at top left, rgba(34,197,94,0.35), transparent 35%),
    radial-gradient(circle at bottom right, rgba(14,165,233,0.3), transparent 40%),
    #020617;
  overflow: hidden;
}

.hero-box {
  width: min(1100px, 95vw);
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 25px;
  background: rgba(15,23,42,0.75);
  border: 2px solid rgba(250,204,21,0.45);
  border-radius: 28px;
  padding: 30px;
  box-shadow: 0 0 45px rgba(250,204,21,0.15);
}

.hero-text h2 {
  font-size: 46px;
  margin: 0;
}

.sub {
  font-size: 21px;
  color: #cbd5f5;
  margin-top: 14px;
  line-height: 1.5;
}

.highlight {
  font-size: 22px;
  font-weight: bold;
  color: #facc15;
  margin-top: 18px;
  letter-spacing: 1px;
}

.cta {
  margin-top: 25px;
  padding: 17px 32px;
  font-size: 19px;
  font-weight: bold;
  border-radius: 18px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #0ea5e9);
  color: white;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.cta:hover {
  transform: scale(1.08);
  background: linear-gradient(135deg, #4ade80, #38bdf8);
}

.hero-img {
  width: 100%;
  max-height: 430px;
  object-fit: contain;
  filter: drop-shadow(0 0 30px rgba(56,189,248,0.55));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-14px);
  }
}

.section-title {
  font-size: 46px;
  margin-bottom: 10px;
}

.title-line {
  width: 110px;
  height: 6px;
  background: #facc15;
  margin: 0 auto 30px;
  border-radius: 10px;
}

.copa-card {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  max-width: 720px;
  margin: 25px auto;
  padding: 30px;
  border-radius: 24px;
  border: 2px solid #22c55e;
  box-shadow: 0 0 25px rgba(34,197,94,0.25);
  text-align: left;
}

.copas-texto {
  white-space: pre-line;
  font-size: 18px;
  line-height: 1.7;
  color: #e5e7eb;
}

.players-list {
  max-width: 430px;
  margin: 0 auto;
  display: grid;
  gap: 16px;
}

.players-list button {
  width: 100%;
  padding: 22px;
  font-size: 25px;
  font-weight: 900;
  border-radius: 20px;
  border: 2px solid #38bdf8;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  cursor: pointer;
  box-shadow: 0 8px 22px rgba(0,0,0,0.35);
  transition: 0.25s;
}

.players-list button:hover {
  transform: scale(1.05);
  border-color: #facc15;
}

.mvp-section {
  min-height: 82vh;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(239,68,68,0.28), transparent 35%),
    radial-gradient(circle at bottom, rgba(250,204,21,0.18), transparent 40%),
    #020617;
}

.mvp-section::before,
.mvp-section::after {
  content: "🔥";
  position: absolute;
  font-size: 90px;
  opacity: 0.75;
  animation: firePulse 1.4s infinite alternate ease-in-out;
}

.mvp-section::before {
  left: 18px;
  top: 95px;
}

.mvp-section::after {
  right: 18px;
  bottom: 55px;
}

@keyframes firePulse {
  from {
    transform: scale(1) rotate(-4deg);
    filter: drop-shadow(0 0 8px #f97316);
  }
  to {
    transform: scale(1.18) rotate(4deg);
    filter: drop-shadow(0 0 22px #ef4444);
  }
}

.mvp-card {
  width: min(95vw, 650px);
  margin: 25px auto;
  padding: 35px 24px;
  border-radius: 32px;
  background: linear-gradient(145deg, rgba(15,23,42,0.94), rgba(30,41,59,0.9));
  border: 2px solid rgba(250,204,21,0.7);
  box-shadow:
    0 0 40px rgba(250,204,21,0.18),
    0 0 80px rgba(239,68,68,0.15);
  animation: cardAppear 0.45s ease;
}

.mvp-rank {
  font-size: 28px;
  font-weight: 900;
  color: #facc15;
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-shadow: 0 0 14px rgba(250,204,21,0.65);
}

.mvp-title {
  font-size: 46px;
  margin: 0 0 28px;
  color: #facc15;
  text-shadow: 0 0 18px rgba(250,204,21,0.45);
}

.mvp-photo {
  width: min(80vw, 360px);
  height: min(80vw, 360px);
  object-fit: cover;
  border-radius: 30px;
  border: 4px solid #facc15;
  box-shadow:
    0 0 35px rgba(250,204,21,0.45),
    0 0 70px rgba(239,68,68,0.25);
}

.mvp-name {
  font-size: 42px;
  margin: 24px 0 10px;
  font-weight: 900;
}

.mvp-description {
  max-width: 520px;
  margin: 0 auto;
  font-size: 19px;
  line-height: 1.6;
  color: #e5e7eb;
}

.mvp-extra-list {
  margin-top: 45px;
  display: grid;
  gap: 18px;
}

.mvp-extra {
  background: rgba(15,23,42,0.82);
  border: 2px solid rgba(250,204,21,0.45);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 0 20px rgba(0,0,0,0.35);
}

.mvp-extra span {
  display: block;
  color: #facc15;
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 8px;
}

.mvp-extra p {
  margin: 0;
  color: #e5e7eb;
  font-size: 18px;
}

.player-page {
  min-height: 100vh;
  padding: 35px 20px;
  background: radial-gradient(circle at top, #1e3a8a, #020617 75%);
}

.back-button {
  font-size: 20px;
  padding: 14px 24px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  margin-bottom: 25px;
  cursor: pointer;
}

.profile-layout {
  width: min(95vw, 430px);
  margin: 0 auto;
}

.player-card {
  width: 100%;
  margin: 0 auto;
  padding: 25px;
  border-radius: 35px;
  background: linear-gradient(145deg, #b8860b, #ffe082, #d4af37, #fff2a8);
  color: #1f1600;
  box-shadow: 0 0 35px rgba(250,204,21,0.55);
  border: 4px solid #fff0a6;
  animation: cardAppear 0.4s ease;
}

@keyframes cardAppear {
  from {
    transform: scale(0.9);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }
}

.overall {
  width: fit-content;
  margin: 0 auto;
  font-size: 62px;
  font-weight: 900;
  background: rgba(255,255,255,0.45);
  padding: 8px 22px;
  border-radius: 20px;
}

.player-photo {
  width: 215px;
  height: 215px;
  object-fit: cover;
  border-radius: 20px;
  margin-top: 18px;
  border: 4px solid rgba(255,255,255,0.7);
}

.player-name {
  font-size: 42px;
  font-weight: 900;
  margin: 18px 0;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  font-size: 24px;
  font-weight: 900;
}

.stat {
  background: rgba(255,255,255,0.35);
  padding: 10px;
  border-radius: 14px;
}

.trophies-outside {
  margin-top: 26px;
  display: grid;
  gap: 18px;
}

.trophy-row {
  display: flex;
  align-items: center;
  gap: 16px;
  background: linear-gradient(135deg, rgba(15,23,42,0.96), rgba(30,41,59,0.92));
  border: 2px solid rgba(250,204,21,0.45);
  border-radius: 24px;
  padding: 15px;
  text-align: left;
  box-shadow: 0 0 25px rgba(0,0,0,0.35);
  animation: trophyAppear 0.45s ease;
}

@keyframes trophyAppear {
  from {
    transform: translateY(15px);
    opacity: 0;
  }

  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.trophy-row img {
  width: 92px;
  height: 92px;
  object-fit: contain;
  border-radius: 16px;
  background: rgba(0,0,0,0.35);
  padding: 7px;
  flex-shrink: 0;
}

.trophy-info h3 {
  margin: 0 0 7px;
  font-size: 21px;
  color: #facc15;
}

.trophy-info p {
  margin: 4px 0;
  font-size: 15px;
  font-weight: bold;
  color: #e5e7eb;
}

@media (max-width: 700px) {
  h1 {
    font-size: 48px;
  }

  nav button {
    width: 100%;
    max-width: 310px;
  }

  .hero-box {
    grid-template-columns: 1fr;
  }

  .hero-text h2 {
    font-size: 36px;
  }

  .section-title {
    font-size: 38px;
  }

  .mvp-title {
    font-size: 36px;
  }

  .mvp-rank {
    font-size: 24px;
  }

  .mvp-name {
    font-size: 34px;
  }

  .mvp-extra span {
    font-size: 21px;
  }

  .mvp-extra p {
    font-size: 16px;
  }

  .mvp-section::before,
  .mvp-section::after {
    font-size: 58px;
  }

  .player-photo {
    width: 155px;
    height: 155px;
  }

  .player-name {
    font-size: 34px;
  }

  .overall {
    font-size: 48px;
  }

  .stats {
    font-size: 18px;
  }

  .trophy-row img {
    width: 78px;
    height: 78px;
  }

  .trophy-info h3 {
    font-size: 18px;
  }

  .trophy-info p {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<header id="mainHeader">
  <h1>Nelson Cup</h1>

  <nav>
    <button onclick="playClick(); showPage('home')">Início</button>
    <button onclick="playClick(); showPage('copas')">Copas</button>
    <button onclick="playClick(); showPage('jogadores')">Jogadores</button>
    <button onclick="playCrowd(); showPage('mvp')">MVP</button>
  </nav>
</header>

<section id="home" class="hero">
  <div class="hero-box">

    <div class="hero-text">
      <h2>🏆 Bem-vindo ao Nelson Cup</h2>

      <p class="sub">
        Um site para marcar partidas e desempenhos atléticos.
      </p>

      <p class="highlight">
        Copas de rua • Rivalidade • Glória • Respeito
      </p>

      <button class="cta" onclick="playClick(); showPage('jogadores')">
        Ver Jogadores
      </button>
    </div>

    <img class="hero-img" src="images/bola-de-futebol-em-ilustracao-vetorial-de-design-de-fogo_333603-769.png" alt="Jogador Nelson Cup">

  </div>
</section>

<section id="copas" class="hidden">
  <h2 class="section-title">🏆 Últimas Copas</h2>
  <div class="title-line"></div>

  <div class="copa-card">
    <div id="copasTextoBox" class="copas-texto"></div>
  </div>
</section>

<section id="jogadores" class="hidden">
  <h2 class="section-title">⚽ Jogadores</h2>
  <div class="title-line"></div>

  <div class="players-list">
    <button onclick="playClick(); openPlayer('Pedro')">• Pedro</button>
    <button onclick="playClick(); openPlayer('Lucca')">• Lucca</button>
    <button onclick="playClick(); openPlayer('Gabriel')">• Gabriel</button>
    <button onclick="playClick(); openPlayer('Luiz')">• Luiz</button>
    <button onclick="playClick(); openPlayer('Ygor')">• Ygor</button>
    <button onclick="playClick(); openPlayer('Leandro')">• Leandro</button>
    <button onclick="playClick(); openPlayer('Heitor')">• Heitor</button>
  </div>
</section>

<section id="mvp" class="hidden mvp-section">
  <div class="mvp-card">

    <div class="mvp-rank">TOP 1</div>

    <h2 class="mvp-title">🔥 MVP 000 🔥</h2>

    <img class="mvp-photo" src="images/foto.png" alt="MVP Player">

    <h3 class="mvp-name">Ainda ninguém</h3>

    <p class="mvp-description">
      Sem descrição
    </p>

    <div class="mvp-extra-list">
      <div class="mvp-extra">
        <span>TOP 2 MVP</span>
        <p>Ainda ninguém</p>
      </div>

      <div class="mvp-extra">
        <span>TOP 3 MVP</span>
        <p>Ainda ninguém</p>
      </div>
    </div>

  </div>
</section>

<section id="playerPage" class="hidden player-page">
  <button class="back-button" onclick="playClick(); showPage('jogadores')">← Voltar</button>
  <div id="playerArea"></div>
</section>

<script>
const trophies = {
  rua: "images/file_00000000d18071f5987f16da6eb05069.png",
  champions: "images/file_00000000ad10720eab9dfb8000ba0e53.png",
  casual: "images/file_0000000091a871f5a486a80138abd116.png"
};

const copasTexto = `
📅 03/05/26:
Ainda em planejamento.
`;

const players = {
  Pedro: {
    rit:0, fin:0, pas:0, con:0, def:0, fis:0,
    foto:"images/foto.png",

    ruaGanhas:0,
    ruaParticipacoes:0,
    ruaTime:"--",

    championsGanhas:0,
    championsParticipacoes:0,
    championsTime:"--",

    casualGanhas:0
  },

  Lucca: {
    rit:0, fin:0, pas:0, con:0, def:0, fis:0,
    foto:"images/17777773382614658375343907720176.jpg",

    ruaGanhas:0,
    ruaParticipacoes:0,
    ruaTime:"--",

    championsGanhas:0,
    championsParticipacoes:0,
    championsTime:"--",

    casualGanhas:0
  },

  Gabriel: {
    rit:0, fin:0, pas:0, con:0, def:0, fis:0,
    foto:"images/foto.png",

    ruaGanhas:0,
    ruaParticipacoes:0,
    ruaTime:"--",

    championsGanhas:0,
    championsParticipacoes:0,
    championsTime:"--",

    casualGanhas:0
  },

  Luiz: {
    rit:0, fin:0, pas:0, con:0, def:0, fis:0,
    foto:"images/foto.png",

    ruaGanhas:0,
    ruaParticipacoes:0,
    ruaTime:"--",

    championsGanhas:0,
    championsParticipacoes:0,
    championsTime:"--",

    casualGanhas:0
  },

  Ygor: {
    rit:0, fin:0, pas:0, con:0, def:0, fis:0,
    foto:"images/foto.png",

    ruaGanhas:0,
    ruaParticipacoes:0,
    ruaTime:"--",

    championsGanhas:0,
    championsParticipacoes:0,
    championsTime:"--",

    casualGanhas:0
  },

  Leandro: {
    rit:0, fin:0, pas:0, con:0, def:0, fis:0,
    foto:"images/foto.png",

    ruaGanhas:0,
    ruaParticipacoes:0,
    ruaTime:"--",

    championsGanhas:0,
    championsParticipacoes:0,
    championsTime:"--",

    casualGanhas:0
  },

  Heitor: {
    rit:0, fin:0, pas:0, con:0, def:0, fis:0,
    foto:"images/foto.png",

    ruaGanhas:0,
    ruaParticipacoes:0,
    ruaTime:"--",

    championsGanhas:0,
    championsParticipacoes:0,
    championsTime:"--",

    casualGanhas:0
  }
};

function atualizarCopas() {
  document.getElementById("copasTextoBox").innerText = copasTexto;
}

function playClick() {
  const audio = new AudioContext();
  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.frequency.value = 520;
  gain.gain.value = 0.04;

  osc.start();
  osc.stop(audio.currentTime + 0.08);
}

function playCrowd() {
  const audio = new AudioContext();

  for (let i = 0; i < 8; i++) {
    const osc = audio.createOscillator();
    const gain = audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value = 180 + Math.random() * 520;
    gain.gain.value = 0.025;

    osc.start(audio.currentTime + i * 0.035);
    osc.frequency.exponentialRampToValueAtTime(120 + Math.random() * 400, audio.currentTime + 0.45);
    gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.55);
    osc.stop(audio.currentTime + 0.58);
  }
}

function playOpenCardSound() {
  const audio = new AudioContext();
  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.frequency.value = 720;
  gain.gain.value = 0.05;

  osc.start();
  osc.frequency.exponentialRampToValueAtTime(320, audio.currentTime + 0.18);
  gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.2);
  osc.stop(audio.currentTime + 0.22);
}

function showPage(page) {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("copas").classList.add("hidden");
  document.getElementById("jogadores").classList.add("hidden");
  document.getElementById("mvp").classList.add("hidden");
  document.getElementById("playerPage").classList.add("hidden");

  document.getElementById("mainHeader").style.display =
    page === "playerPage" ? "none" : "block";

  document.getElementById(page).classList.remove("hidden");
}

function openPlayer(name) {
  playOpenCardSound();

  const p = players[name];

  const overall = Math.round(
    (p.rit + p.fin + p.pas + p.con + p.def + p.fis) / 6
  );

  document.getElementById("playerArea").innerHTML = `
    <div class="profile-layout">

      <div class="player-card">
        <div class="overall">${String(overall).padStart(2,"0")}</div>

        <img class="player-photo" src="${p.foto}" alt="${name}">

        <div class="player-name">${name}</div>

        <div class="stats">
          <div class="stat">RIT ${String(p.rit).padStart(2,"0")}</div>
          <div class="stat">FIN ${String(p.fin).padStart(2,"0")}</div>
          <div class="stat">PAS ${String(p.pas).padStart(2,"0")}</div>
          <div class="stat">CON ${String(p.con).padStart(2,"0")}</div>
          <div class="stat">DEF ${String(p.def).padStart(2,"0")}</div>
          <div class="stat">FÍS ${String(p.fis).padStart(2,"0")}</div>
        </div>
      </div>

      <div class="trophies-outside">

        <div class="trophy-row">
          <img src="${trophies.rua}" alt="Taça de Rua">
          <div class="trophy-info">
            <h3>Taça de Rua</h3>
            <p>Copas ganhas: ${p.ruaGanhas}</p>
            <p>Participações: ${p.ruaParticipacoes}</p>
            <p>Time: ${p.ruaTime}</p>
          </div>
        </div>

        <div class="trophy-row">
          <img src="${trophies.champions}" alt="Taça Champions">
          <div class="trophy-info">
            <h3>Taça Champions</h3>
            <p>Copas ganhas: ${p.championsGanhas}</p>
            <p>Participações: ${p.championsParticipacoes}</p>
            <p>Time: ${p.championsTime}</p>
          </div>
        </div>

        <div class="trophy-row">
          <img src="${trophies.casual}" alt="Taça Casual">
          <div class="trophy-info">
            <h3>Taça Casual</h3>
            <p>Copas ganhas: ${p.casualGanhas}</p>
            <p>Modalidade: individual</p>
          </div>
        </div>

      </div>

    </div>
  `;

  showPage("playerPage");
}

atualizarCopas();
</script>

</body>
</html>
