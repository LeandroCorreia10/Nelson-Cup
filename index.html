<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nelson Cup</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  text-align: center;
}

header {
  padding: 35px 20px;
  background: linear-gradient(135deg, #16a34a, #0284c7, #1d4ed8);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  position: sticky;
  top: 0;
  z-index: 10;
}

h1 {
  font-size: 58px;
  margin: 0 0 25px;
  letter-spacing: 3px;
  text-shadow: 0 0 18px rgba(255,255,255,0.35);
}

nav {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

nav button {
  font-size: 20px;
  padding: 17px 30px;
  border-radius: 18px;
  border: 2px solid rgba(255,255,255,0.7);
  font-weight: 900;
  background: linear-gradient(135deg, #ffffff, #dbeafe);
  color: #020617;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,0,0,0.35);
  transition: 0.25s;
}

nav button:hover {
  transform: scale(1.08);
  background: #facc15;
}

section {
  padding: 35px 20px;
}

.hidden {
  display: none;
}

.hero {
  min-height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at top left, rgba(34,197,94,0.35), transparent 35%),
    radial-gradient(circle at bottom right, rgba(14,165,233,0.3), transparent 40%),
    #020617;
  overflow: hidden;
}

.hero-box {
  width: min(1100px, 95vw);
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 25px;
  background: rgba(15,23,42,0.75);
  border: 2px solid rgba(250,204,21,0.45);
  border-radius: 28px;
  padding: 30px;
  box-shadow: 0 0 45px rgba(250,204,21,0.15);
}

.hero-text h2 {
  font-size: 46px;
  margin: 0;
}

.hero-text p {
  font-size: 20px;
  line-height: 1.5;
  color: #dbeafe;
}

.hero-text strong {
  color: #facc15;
}

.hero-img {
  width: 100%;
  max-height: 430px;
  object-fit: contain;
  filter: drop-shadow(0 0 30px rgba(56,189,248,0.55));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}

.section-title {
  font-size: 46px;
  margin-bottom: 10px;
}

.title-line {
  width: 110px;
  height: 6px;
  background: #facc15;
  margin: 0 auto 30px;
  border-radius: 10px;
}

.players-list {
  max-width: 430px;
  margin: 0 auto;
  display: grid;
  gap: 16px;
}

.players-list button {
  width: 100%;
  padding: 22px;
  font-size: 25px;
  font-weight: 900;
  border-radius: 20px;
  border: 2px solid #38bdf8;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  cursor: pointer;
  box-shadow: 0 8px 22px rgba(0,0,0,0.35);
  transition: 0.25s;
}

.players-list button:hover {
  transform: scale(1.05);
  border-color: #facc15;
}

.copa-card {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  max-width: 380px;
  margin: 25px auto;
  padding: 28px;
  border-radius: 24px;
  border: 2px solid #22c55e;
  box-shadow: 0 0 25px rgba(34,197,94,0.25);
}

.player-page {
  min-height: 100vh;
  padding: 35px 20px;
  background: radial-gradient(circle at top, #1e3a8a, #020617 70%);
}

.back-button {
  font-size: 20px;
  padding: 14px 24px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  margin-bottom: 25px;
}

.player-card {
  width: min(92vw, 390px);
  min-height: 600px;
  margin: 0 auto;
  padding: 25px;
  border-radius: 35px;
  background: linear-gradient(145deg, #b8860b, #ffe082, #d4af37, #fff2a8);
  color: #1f1600;
  box-shadow: 0 0 35px rgba(250,204,21,0.5);
  border: 4px solid #fff0a6;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.overall {
  font-size: 58px;
  font-weight: 900;
}

.trophy-box {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 28px;
  font-weight: 900;
}

.trophy-box img {
  width: 42px;
  height: 42px;
  object-fit: contain;
}

.player-photo {
  width: 210px;
  height: 210px;
  object-fit: cover;
  border-radius: 20px;
  margin-top: 15px;
  border: 4px solid rgba(255,255,255,0.7);
}

.player-name {
  font-size: 42px;
  font-weight: 900;
  margin: 18px 0;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  font-size: 24px;
  font-weight: 900;
}

.stat {
  background: rgba(255,255,255,0.35);
  padding: 10px;
  border-radius: 14px;
}

@media (max-width: 700px) {
  h1 {
    font-size: 48px;
  }

  nav button {
    width: 100%;
    max-width: 310px;
  }

  .hero-box {
    grid-template-columns: 1fr;
  }

  .hero-text h2 {
    font-size: 36px;
  }
}
</style>
</head>

<body>

<header id="mainHeader">
  <h1>Nelson Cup</h1>
  <nav>
    <button onclick="playClick(); showPage('home')">Início</button>
    <button onclick="playClick(); showPage('copas')">Copas</button>
    <button onclick="playClick(); showPage('jogadores')">Jogadores</button>
  </nav>
</header>

<section id="home" class="hero">
  <div class="hero-box">
    <div class="hero-text">
      <h2>🏆 Bem-vindo à Nelson Cup</h2>
      <p>
        Onde cada partida vira história, cada vitória pesa como ouro
        e cada jogador entra em campo para deixar seu nome marcado.
      </p>
      <p><strong>Copas de rua. Rivalidade. Glória. Respeito.</strong></p>
    </div>

    <img class="hero-img" src="images/IsagiRender.webp" alt="Jogador Nelson Cup">
  </div>
</section>

<section id="copas" class="hidden">
  <h2 class="section-title">🏆 Últimas Copas</h2>
  <div class="title-line"></div>

  <div class="copa-card">
    <h2>Nelson Cup</h2>
    <p>Data: 03/05/26</p>
    <p>Campeão: --</p>
  </div>
</section>

<section id="jogadores" class="hidden">
  <h2 class="section-title">⚽ Jogadores</h2>
  <div class="title-line"></div>

  <div class="players-list">
    <button onclick="playClick(); openPlayer('Pedro')">• Pedro</button>
    <button onclick="playClick(); openPlayer('Lucca')">• Lucca</button>
    <button onclick="playClick(); openPlayer('Gabriel')">• Gabriel</button>
    <button onclick="playClick(); openPlayer('Luiz')">• Luiz</button>
    <button onclick="playClick(); openPlayer('Ygor')">• Ygor</button>
    <button onclick="playClick(); openPlayer('Leandro')">• Leandro</button>
  </div>
</section>

<section id="playerPage" class="hidden player-page">
  <button class="back-button" onclick="playClick(); showPage('jogadores')">← Voltar</button>
  <div id="playerArea"></div>
</section>

<script>
const players = {
  Pedro:   {rit:0, fin:0, pas:0, con:0, def:0, fis:0, copas:0, foto:"images/foto.png"},
  Lucca:   {rit:0, fin:0, pas:0, con:0, def:0, fis:0, copas:0, foto:"images/17777773382614658375343907720176.jpg"},
  Gabriel: {rit:0, fin:0, pas:0, con:0, def:0, fis:0, copas:0, foto:"images/foto.png"},
  Luiz:    {rit:0, fin:0, pas:0, con:0, def:0, fis:0, copas:0, foto:"images/foto.png"},
  Ygor:    {rit:0, fin:0, pas:0, con:0, def:0, fis:0, copas:0, foto:"images/foto.png"},
  Leandro: {rit:0, fin:0, pas:0, con:0, def:0, fis:0, copas:0, foto:"images/foto.png"}
};

function playClick() {
  const audio = new AudioContext();
  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.frequency.value = 520;
  gain.gain.value = 0.04;

  osc.start();
  osc.stop(audio.currentTime + 0.08);
}

function showPage(page) {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("copas").classList.add("hidden");
  document.getElementById("jogadores").classList.add("hidden");
  document.getElementById("playerPage").classList.add("hidden");

  document.getElementById("mainHeader").style.display =
    page === "playerPage" ? "none" : "block";

  document.getElementById(page).classList.remove("hidden");
}

function openPlayer(name) {
  const p = players[name];

  const overall = Math.round(
    (p.rit + p.fin + p.pas + p.con + p.def + p.fis) / 6
  );

  document.getElementById("playerArea").innerHTML = `
    <div class="player-card">
      <div class="card-top">
        <div class="overall">${String(overall).padStart(2,"0")}</div>

        <div class="trophy-box">
          <img src="images/427687.png" alt="Troféu">
          <span>${p.copas}</span>
        </div>
      </div>

      <img class="player-photo" src="${p.foto}" alt="${name}">

      <div class="player-name">${name}</div>

      <div class="stats">
        <div class="stat">RIT ${String(p.rit).padStart(2,"0")}</div>
        <div class="stat">FIN ${String(p.fin).padStart(2,"0")}</div>
        <div class="stat">PAS ${String(p.pas).padStart(2,"0")}</div>
        <div class="stat">CON ${String(p.con).padStart(2,"0")}</div>
        <div class="stat">DEF ${String(p.def).padStart(2,"0")}</div>
        <div class="stat">FÍS ${String(p.fis).padStart(2,"0")}</div>
      </div>
    </div>
  `;

  showPage("playerPage");
}
</script>

</body>
</html>
