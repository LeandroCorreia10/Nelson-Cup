<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nelson Cup</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

header {
  padding: 30px;
  background: linear-gradient(90deg, #22c55e, #0ea5e9);
}

h1 {
  font-size: 60px;
  margin: 0;
}

nav button {
  margin: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  font-weight: bold;
}

section {
  padding: 30px;
}

.hidden {
  display: none;
}

.player-card {
  width: 260px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, gold, #fff1a8);
  color: black;
}

.player-photo {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

.stats {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>Nelson Cup</h1>
  <nav>
    <button onclick="showPage('home')">Início</button>
    <button onclick="showPage('copas')">Copas</button>
    <button onclick="showPage('jogadores')">Jogadores</button>
  </nav>
</header>

<section id="home">
  <h2>🏆 Copas de rua de futebol</h2>
</section>

<section id="copas" class="hidden">
  <h2>🏆 Últimas Copas</h2>
  <div>
    <h3>Nelson Cup</h3>
    <p>Data: 03/05/26</p>
    <p>Campeão: --</p>
  </div>
</section>

<section id="jogadores" class="hidden">
  <h2>Jogadores</h2>

  <button onclick="openPlayer('Pedro')">Pedro</button>
  <button onclick="openPlayer('Lucca')">Lucca</button>
  <button onclick="openPlayer('Gabriel')">Gabriel</button>
  <button onclick="openPlayer('Luiz')">Luiz</button>
  <button onclick="openPlayer('Ygor')">Ygor</button>
  <button onclick="openPlayer('Leandro')">Leandro</button>

  <div id="playerArea"></div>
</section>

<script>
const players = {
  Pedro:   {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"images/foto.png"},
  Lucca:   {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"images/17777773382614658375343907720176.jpg"},
  Gabriel: {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"images/foto.png"},
  Luiz:    {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"images/foto.png"},
  Ygor:    {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"images/foto.png"},
  Leandro: {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"images/foto.png"}
};

function showPage(page) {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("copas").classList.add("hidden");
  document.getElementById("jogadores").classList.add("hidden");

  document.getElementById(page).classList.remove("hidden");
}

function openPlayer(name) {
  const p = players[name];

  const overall = Math.round(
    (p.rit + p.fin + p.pas + p.con + p.def + p.fis) / 6
  );

  document.getElementById("playerArea").innerHTML = `
    <div class="player-card">
      <h2>${String(overall).padStart(2,"0")}</h2>
      <img class="player-photo" src="${p.foto}">
      <h3>${name}</h3>
      <div class="stats">
        RIT ${String(p.rit).padStart(2,"0")} |
        FIN ${String(p.fin).padStart(2,"0")} |
        PAS ${String(p.pas).padStart(2,"0")} |
        CON ${String(p.con).padStart(2,"0")} |
        DEF ${String(p.def).padStart(2,"0")} |
        FÍS ${String(p.fis).padStart(2,"0")}
      </div>
    </div>
  `;
}
</script>

</body>
</html>
