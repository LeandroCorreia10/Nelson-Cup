<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nelson Cup</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

header {
  padding: 35px;
  background: linear-gradient(90deg, #22c55e, #0ea5e9);
}

h1 {
  font-size: 62px;
  margin: 0;
}

nav {
  margin-top: 18px;
}

nav button {
  background: white;
  color: #0f172a;
  border: none;
  padding: 10px 18px;
  margin: 5px;
  border-radius: 20px;
  font-weight: bold;
}

section {
  padding: 35px;
}

.hidden {
  display: none;
}

.copas-title {
  font-size: 38px;
}

.card-copa {
  background: #1e293b;
  padding: 25px;
  border-radius: 14px;
  width: 260px;
  margin: 20px auto;
}

.players-list button {
  display: block;
  margin: 12px auto;
  width: 220px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 20px;
  font-weight: bold;
}

.player-card {
  width: 270px;
  margin: 25px auto;
  padding: 22px;
  border-radius: 25px;
  background: linear-gradient(135deg, #d4af37, #fff1a8, #b8860b);
  color: #211700;
  box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
}

.overall {
  font-size: 48px;
  font-weight: bold;
}

.player-photo {
  width: 150px;
  height: 150px;
  border-radius: 15px;
  object-fit: cover;
  background: #222;
}

.player-name {
  font-size: 34px;
  font-weight: bold;
  margin: 10px;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>Nelson Cup</h1>
  <nav>
    <button onclick="showPage('home')">Início</button>
    <button onclick="showPage('jogadores')">Jogadores</button>
    <button onclick="showPage('copas')">Copas</button>
  </nav>
</header>

<section id="home">
  <h2>🏆 Copas de rua de futebol</h2>
  <p>Bem-vindo ao site oficial da Nelson Cup.</p>
</section>

<section id="copas" class="hidden">
  <h2 class="copas-title">🏆 Últimas Copas</h2>

  <div class="card-copa">
    <h3>Nelson Cup</h3>
    <p>Data: 03/05/26</p>
    <p>Campeão: ainda não definido</p>
  </div>
</section>

<section id="jogadores" class="hidden">
  <h2>Jogadores</h2>

  <div class="players-list">
    <button onclick="openPlayer('Pedro')">Pedro</button>
    <button onclick="openPlayer('Lucca')">Lucca</button>
    <button onclick="openPlayer('Gabriel')">Gabriel</button>
    <button onclick="openPlayer('Luiz')">Luiz</button>
    <button onclick="openPlayer('Ygor')">Ygor</button>
    <button onclick="openPlayer('Leandro')">Leandro</button>
  </div>

  <div id="playerArea"></div>
</section>

<script>
const players = {
  Pedro:   {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"foto.png"},
  Lucca:   {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"foto.png"},
  Gabriel: {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"foto.png"},
  Luiz:    {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"foto.png"},
  Ygor:    {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"foto.png"},
  Leandro: {rit:0, fin:0, pas:0, con:0, def:0, fis:0, foto:"foto.png"}
};

function showPage(page) {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("jogadores").classList.add("hidden");
  document.getElementById("copas").classList.add("hidden");
  document.getElementById(page).classList.remove("hidden");
}

function openPlayer(name) {
  const p = players[name];

  const overall = Math.round(
    (p.rit + p.fin + p.pas + p.con + p.def + p.fis) / 6
  );

  document.getElementById("playerArea").innerHTML = `
    <div class="player-card">
      <div class="overall">${String(overall).padStart(2, "0")}</div>
      <img class="player-photo" src="${p.foto}" alt="${name}">
      <div class="player-name">${name}</div>

      <div class="stats">
        <div>RIT ${String(p.rit).padStart(2, "0")}</div>
        <div>FIN ${String(p.fin).padStart(2, "0")}</div>
        <div>PAS ${String(p.pas).padStart(2, "0")}</div>
        <div>CON ${String(p.con).padStart(2, "0")}</div>
        <div>DEF ${String(p.def).padStart(2, "0")}</div>
        <div>FÍS ${String(p.fis).padStart(2, "0")}</div>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
